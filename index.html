<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Para la futura doctora Mari 🩺💌">
    <meta property="og:description" content="¡Tengo una pregunta muy importante para ti!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=500&auto=format&fit=crop">
    
    <title>Para Mari 💖</title>
    <style>
        :root {
            --bg-color: #ffeef2;
            --main-pink: #ff6b81;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; 
        }

        .v-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .emoji-container {
            font-size: 4.5rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        .question {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--main-pink);
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .compliment {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        #yesBtn { 
            background: var(--main-pink); 
            color: white; 
            z-index: 20; 
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
            white-space: nowrap;
        }
        
        #noBtn { 
            background: #adb5bd; 
            color: white; 
            z-index: 100; 
            white-space: nowrap;
        }

        .hidden { display: none !important; }

        #celebration-page h1 { font-size: 2.2rem; color: var(--main-pink); margin-bottom: 10px;}
        #celebration-page p { font-size: 1.1rem; color: #444; line-height: 1.5; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        .rain {
            position: fixed;
            top: -50px;
            color: var(--main-pink);
            font-weight: bold;
            font-size: 1.5rem;
            z-index: 1000;
            pointer-events: none; 
            animation: fall linear forwards;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="question-page" class="v-container">
        <div id="mainEmoji" class="emoji-container">🧸💖</div>
        
        <div class="question">Mari, con esa sonrisa tan encantadora y un corazón tan hermoso...</div>
        <div class="compliment">¿Quieres ser mi San Valentín?</div>
        
        <div id="btnContainer" class="options">
            <button id="yesBtn">¡SÍ!</button>
            <button id="noBtn">No...</button>
        </div>
    </div>

    <div id="celebration-page" class="v-container hidden">
        <div class="emoji-container">🥰🎉</div>
        <h1>¡Lo sabía! 🥰</h1>
        <p>
            ¡Salgamos a comer algo delicioso para recargar energías! 🍫🌹<br><br>
            <strong>¡Mucho ánimo con tus estudios de medicina, futura doctora! Siempre te apoyo. 🩺✨</strong>
        </p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const btnContainer = document.getElementById('btnContainer');
        const qPage = document.getElementById('question-page');
        const sPage = document.getElementById('celebration-page');
        const mainEmoji = document.getElementById('mainEmoji');

        let noClickCount = 0;
        let yesScale = 1;
        let noScale = 1;
        let bounceInterval;
        
        let posX, posY;
        let velocityX = 6; // 모바일에서도 클릭 시도를 해볼 만한 깐족거리는 속도
        let velocityY = 6;

        const messages = [
            "¿De verdad? 🥺",               
            "Piénsalo bien...",            
            "¡Eres muy cruel! 🚑",         
            "¡Mi corazón sufre! 💔",       
            "¡Me escapo! 💨",             
            "¡Aquí estoy! 😜",            
            "¡Cambio de lugar! ✨",        
            "¡Atrápame si puedes! 🏃‍♀️",    
            "¡SÍ!"                        
        ];

        // 화면 중앙을 기준으로 '안전 반경(박스)' 내에서만 이동하게 제한하는 함수
        function getSafeZone() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const radiusX = Math.min(120, window.innerWidth / 3); // 가로 한계치
            const radiusY = Math.min(150, window.innerHeight / 3); // 세로 한계치

            return {
                minX: centerX - radiusX,
                maxX: centerX + radiusX - noBtn.offsetWidth,
                minY: centerY - radiusY,
                maxY: centerY + radiusY - noBtn.offsetHeight
            };
        }

        // 5~6단계: 화면 중앙 근처에서만 텔레포트
        function teleportButton() {
            noBtn.style.position = 'fixed';
            const safeZone = getSafeZone();

            const randomX = safeZone.minX + Math.random() * (safeZone.maxX - safeZone.minX);
            const randomY = safeZone.minY + Math.random() * (safeZone.maxY - safeZone.minY);

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // 8단계: 화면 중앙 근처 보이지 않는 박스 안에서만 튕겨 다니기
        function startBouncing() {
            // 현재 위치 저장
            posX = noBtn.getBoundingClientRect().left;
            posY = noBtn.getBoundingClientRect().top;
            
            bounceInterval = setInterval(() => {
                const safeZone = getSafeZone();

                posX += velocityX;
                posY += velocityY;

                // 중앙 박스 경계에 닿으면 튕김
                if (posX <= safeZone.minX || posX >= safeZone.maxX) velocityX *= -1;
                if (posY <= safeZone.minY || posY >= safeZone.maxY) velocityY *= -1;

                // 오차 보정 (박스 밖으로 나가는 것 원천 차단)
                posX = Math.max(safeZone.minX, Math.min(posX, safeZone.maxX));
                posY = Math.max(safeZone.minY, Math.min(posY, safeZone.maxY));

                noBtn.style.left = `${posX}px`;
                noBtn.style.top = `${posY}px`;
            }, 20); // 프레임 속도를 올려서 부드럽고 얄밉게 이동
        }

        // 9단계: YES 비 내리기
        function startYesRain() {
            for(let i = 0; i < 60; i++) {
                setTimeout(() => {
                    let rain = document.createElement('div');
                    rain.innerText = '¡SÍ! 💖';
                    rain.classList.add('rain');
                    rain.style.left = Math.random() * 90 + 'vw';
                    rain.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                    document.body.appendChild(rain);
                }, i * 50); 
            }
        }

        function showSuccess() {
            qPage.classList.add('hidden');
            sPage.classList.remove('hidden');
        }

        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            if(noClickCount <= 9) {
                noBtn.innerText = messages[noClickCount - 1];
            }

            // 1~4단계: No는 작아지고, Yes는 커짐
            if (noClickCount <= 4) {
                noScale -= 0.15;
                yesScale += 0.4;
                noBtn.style.transform = `scale(${noScale})`;
                yesBtn.style.transform = `scale(${yesScale})`;
                if(noClickCount === 2) mainEmoji.innerText = "🥺🩺";
                if(noClickCount === 4) mainEmoji.innerText = "🚑💦";
            } 
            
            // 5~6단계: 화면 중앙 구역에서만 텔레포트
            else if (noClickCount === 5 || noClickCount === 6) {
                noBtn.style.transform = `scale(1)`; 
                teleportButton();
            } 
            
            // 7단계: Yes와 위치 바꾸기
            else if (noClickCount === 7) {
                noBtn.style.position = 'static'; 
                btnContainer.style.flexDirection = 'row-reverse'; 
                mainEmoji.innerText = "👀⁉️";
            } 
            
            // 8단계: 중앙 박스 안에서만 튕겨 다니기
            else if (noClickCount === 8) {
                noBtn.style.position = 'fixed';
                mainEmoji.innerText = "🏃‍♀️💨";
                startBouncing();
            } 
            
            // 9단계: YES로 변신 & 비 내리기
            else if (noClickCount >= 9) {
                clearInterval(bounceInterval); 
                noBtn.style.position = 'static'; 
                btnContainer.style.flexDirection = 'row'; 
                
                noBtn.style.background = 'var(--main-pink)';
                noBtn.style.boxShadow = '0 4px 15px rgba(255, 107, 129, 0.4)';
                
                startYesRain();
                mainEmoji.innerText = "🥰🎉";
                
                noBtn.addEventListener('click', showSuccess);
            }
        });

        yesBtn.addEventListener('click', showSuccess);

    </script>
</body>
</html>
