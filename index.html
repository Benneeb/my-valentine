<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>너만을 위한 특별한 질문 💌</title>
    <style>
        /* 기본 스타일 */
        :root {
            --bg-color: #ffeef2;
            --main-pink: #ff6b81;
            --light-pink: #ff8e9e;
            --text-color: #4a4a4a;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            overflow: hidden;
            color: var(--text-color);
        }

        /* 글래스모피즘 컨테이너 */
        .v-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .gif-container {
            height: 200px;
            margin-bottom: 25px;
            overflow: hidden;
            border-radius: 20px;
        }

        .gif-container img {
            height: 100%;
            border-radius: 20px;
        }

        .question {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--main-pink);
            margin-bottom: 35px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.05);
            animation: heartbeat 1.5s infinite;
        }

        .options {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* 버튼 스타일 */
        .v-button {
            padding: 16px 35px;
            font-size: 1.3rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            -webkit-tap-highlight-color: transparent; /* 모바일 하이라이트 제거 */
        }

        #yesBtn {
            background-color: var(--main-pink);
            color: white;
            box-shadow: 0 6px 20px rgba(255, 107, 129, 0.4);
            position: relative;
            z-index: 100;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        /* 애니메이션 */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        /* 결과 화면 */
        #celebration-container {
            display: none;
        }

        #celebration-container.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #celebration-container .question {
            font-size: 2.8rem;
            margin-top: 20px;
        }

        /* 배경 장식 (모바일에서 더 감각적으로 보이게) */
        .bg-decor {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            z-index: 1;
            opacity: 0.6;
        }
        .decor1 { width: 150px; height: 150px; background-color: var(--light-pink); top: 10%; left: -20px; }
        .decor2 { width: 200px; height: 200px; background-color: #ffe082; bottom: 5%; right: -50px; }
    </style>
</head>
<body>

    <div class="bg-decor decor1"></div>
    <div class="bg-decor decor2"></div>

    <div id="question-page" class="v-container active">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3R4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="cute Valentine bear">
        </div>
        <div id="mainQuestion" class="question">Will you be my Valentine? 💖</div>
        
        <div class="options">
            <button id="yesBtn" class="v-button">그럼! YES!</button>
            <button id="noBtn" class="v-button">음... No?</button>
        </div>
    </div>

    <div id="celebration-container" class="v-container">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3R4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/26BRv0ThflsHCqfJA/giphy.gif" alt="celebration bear">
        </div>
        <div class="question">I knew it! 🥰</div>
        <p style="font-size: 1.6rem; font-weight: 600; color: #ff6b81;">우리 꼭 맛있는 거 먹자! 🍫🌹</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionPage = document.getElementById('question-page');
        const celebrationContainer = document.getElementById('celebration-container');
        const mainQuestion = document.getElementById('mainQuestion');
        const gifContainerImg = document.querySelector('.gif-container img');

        let yesFontSize = 1.3; // rem
        let yesPaddingHeight = 16; // px
        let yesPaddingWidth = 35; // px
        let noClickCount = 0;

        // No 버튼 클릭 시 유머러스한 반응 메시지 배열
        const noMessages = [
            "진심이야? 실수 아니구? 🥺",
            "한 번 더 생각해봐...",
            "설마? 진짜 안 된다고?",
            "YES 버튼이 점점 커지는데?",
            "어? 버튼이 왜 안 눌리지? (방해)",
            "포기하고 YES를 눌러! 🌹",
            "이쯤 되면 YES 눌러줘...😭"
        ];

        // No 버튼 클릭 이벤트
        noBtn.addEventListener('click', () => {
            noClickCount++;

            // 1. YES 버튼 기하급수적으로 키우기
            yesFontSize += 0.4;
            yesPaddingHeight += 8;
            yesPaddingWidth += 15;
            
            yesBtn.style.fontSize = `${yesFontSize}rem`;
            yesBtn.style.padding = `${yesPaddingHeight}px ${yesPaddingWidth}px`;

            // 2. NO 버튼 텍스트 변경
            if (noClickCount <= noMessages.length) {
                noBtn.innerText = noMessages[noClickCount - 1];
            } else {
                noBtn.innerText = "더 이상 도망갈 곳은 없다! 😂";
            }

            // 3. 질문 텍스트 및 GIF 변경 (유머)
            if (noClickCount === 2) {
                gifContainerImg.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOXZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/08YhkP62d-94-v7yE/giphy.gif"; // 걱정하는 GIF
                mainQuestion.innerText = "설마 No는 아니겠지...? 😟";
            }
            if (noClickCount === 4) {
                mainQuestion.innerText = "이제 No를 누르기 힘들걸?";
            }
            if (noClickCount === 6) {
                mainQuestion.innerText = "자, 이제 '그럼! YES!'를 누를 시간이야! 💖";
            }

            // 4. NO 버튼 흔들기 애니메이션 (세련된 방해)
            noBtn.classList.add('shake');
            setTimeout(() => {
                noBtn.classList.remove('shake');
            }, 500);
        });

        // YES 버튼 클릭 이벤트
        yesBtn.addEventListener('click', () => {
            questionPage.classList.remove('active');
            questionPage.style.display = 'none'; // 질문 페이지 숨기기
            celebrationContainer.classList.add('active'); // 결과 페이지 표시
        });
    </script>
</body>
</html>
