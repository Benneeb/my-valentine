<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="너에게 도착한 비밀 편지 💌">
    <meta property="og:description" content="꼭 끝까지 확인해봐!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=500&auto=format&fit=crop">
    
    <title>Will You Be My Valentine?</title>
    <style>
        :root {
            --bg-color: #ffeef2;
            --main-pink: #ff6b81;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
            font-family: sans-serif;
            overflow: hidden;
        }

        .v-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .gif-container {
            width: 100%;
            height: 200px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-container img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 15px;
        }

        .question {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--main-pink);
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 150px; /* YES 버튼이 커질 공간 확보 */
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn { background: var(--main-pink); color: white; z-index: 10; }
        #noBtn { background: #adb5bd; color: white; }

        .hidden { display: none !important; }

        /* 결과 화면 스타일 */
        #celebration-page h1 { font-size: 2.5rem; color: var(--main-pink); }
    </style>
</head>
<body>

    <div id="question-page" class="v-container">
        <div class="gif-container">
            <img id="mainGif" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3R4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="cute bear">
        </div>
        <div id="msg" class="question">Will you be my Valentine? 💖</div>
        <div class="options">
            <button id="yesBtn">YES!</button>
            <button id="noBtn">No...</button>
        </div>
    </div>

    <div id="celebration-page" class="v-container hidden">
        <div class="gif-container">
            <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3R4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/26BRv0ThflsHCqfJA/giphy.gif" alt="success bear">
        </div>
        <h1>I knew it! 🥰</h1>
        <p style="color: #ff6b81; font-weight: bold;">우리 꼭 맛있는 거 먹자! 🍫🌹</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const qPage = document.getElementById('question-page');
        const sPage = document.getElementById('celebration-page');
        const msg = document.getElementById('msg');
        const mainGif = document.getElementById('mainGif');

        let yesScale = 1;
        let noClickCount = 0;

        const messages = ["정말루? 🥺", "생각해봐..", "진짜 안돼?", "자꾸 이러면..", "YES 버튼만 보일걸?", "그냥 눌러줘! 💖"];

        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            // 1. YES 버튼 키우기 (더 크게!)
            yesScale += 0.6;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            // 2. 메시지 바꾸기
            if(noClickCount <= messages.length) {
                noBtn.innerText = messages[noClickCount-1];
            } else {
                noBtn.innerText = "이제 포기해! 😂";
            }

            // 3. 이미지 살짝 당황하는 걸로 변경
            if(noClickCount === 3) {
                mainGif.src = "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHpueGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif"; 
            }
        });

        yesBtn.addEventListener('click', () => {
            qPage.classList.add('hidden');
            sPage.classList.remove('hidden');
        });
    </script>
</body>
</html>
