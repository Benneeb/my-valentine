<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Para la futura doctora Mari 🩺💌">
    <meta property="og:description" content="¡Tengo una pregunta muy importante para ti!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=500&auto=format&fit=crop">
    
    <title>Para Mari 💖</title>
    <style>
        :root {
            --bg-color: #ffeef2;
            --main-pink: #ff6b81;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            /* overflow: hidden을 제거하고 min-height를 주어 버튼이 커지면 스크롤되도록 수정 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .v-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        /* GIF 대신 이모지를 사용하는 컨테이너 */
        .emoji-container {
            font-size: 5rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        .question {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--main-pink);
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .compliment {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* 플렉스 랩을 적용하여 YES가 커지면 NO가 자연스럽게 밑으로 밀려남 */
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn { 
            background: var(--main-pink); 
            color: white; 
            z-index: 10; 
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
        }
        
        #noBtn { 
            background: #adb5bd; 
            color: white; 
        }

        .hidden { display: none !important; }

        #celebration-page h1 { font-size: 2.2rem; color: var(--main-pink); margin-bottom: 10px;}
        #celebration-page p { font-size: 1.1rem; color: #444; line-height: 1.5; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <div id="question-page" class="v-container">
        <div id="mainEmoji" class="emoji-container">🧸💖</div>
        
        <div class="question">Mari, con esa sonrisa tan encantadora y un corazón tan hermoso...</div>
        <div class="compliment">¿Quieres ser mi San Valentín?</div>
        
        <div class="options">
            <button id="yesBtn">¡SÍ!</button>
            <button id="noBtn">No...</button>
        </div>
    </div>

    <div id="celebration-page" class="v-container hidden">
        <div class="emoji-container">🥰🎉</div>
        <h1>¡Lo sabía! 🥰</h1>
        <p>
            ¡Salgamos a comer algo delicioso para recargar energías! 🍫🌹<br><br>
            <strong>¡Mucho ánimo con tus estudios de medicina, futura doctora! Siempre te apoyo. 🩺✨</strong>
        </p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const qPage = document.getElementById('question-page');
        const sPage = document.getElementById('celebration-page');
        const mainEmoji = document.getElementById('mainEmoji');

        // transform: scale 대신 폰트 사이즈와 패딩을 조절하여 요소가 겹치지 않게 만듭니다.
        let yesFontSize = 1; // rem 단위
        let yesPadY = 12; // px 단위
        let yesPadX = 25; // px 단위
        let noClickCount = 0;

        const messages = [
            "¿De verdad, futura doctora? 🥺", 
            "Sé que estudiar medicina es duro, pero...", 
            "¡Te prometo mucha energía para estudiar! ☕", 
            "¡Tu hermosa sonrisa merece un SÍ!", 
            "¿En serio vas a rechazarme? 🚑", 
            "¡Ya ríndete y di que SÍ! 💖"
        ];

        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            // 1. YES 버튼 겹침 현상 해결: 크기를 키우면 옆/아래 요소를 밀어내도록 설정
            yesFontSize += 0.5;
            yesPadY += 8;
            yesPadX += 15;
            
            yesBtn.style.fontSize = `${yesFontSize}rem`;
            yesBtn.style.padding = `${yesPadY}px ${yesPadX}px`;
            
            // 2. 메시지 바꾸기
            if(noClickCount <= messages.length) {
                noBtn.innerText = messages[noClickCount-1];
            } else {
                noBtn.innerText = "¡Es tu única opción! 😂"; 
            }

            // 3. 누를 때마다 귀엽게 당황하는 이모지로 변경
            if(noClickCount === 2) mainEmoji.innerText = "🥺🩺";
            if(noClickCount === 4) mainEmoji.innerText = "🚑💦";
            if(noClickCount === 6) mainEmoji.innerText = "😭💖";
        });

        yesBtn.addEventListener('click', () => {
            qPage.classList.add('hidden');
            sPage.classList.remove('hidden');
        });
    </script>
</body>
</html>
