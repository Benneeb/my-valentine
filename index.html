<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Para la futura doctora Mari 🩺💌">
    <meta property="og:description" content="¡Tengo una pregunta muy importante para ti!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=500&auto=format&fit=crop">
    
    <title>Para Mari 💖</title>
    <style>
        :root {
            --bg-color: #ffeef2;
            --main-pink: #ff6b81;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; /* 도망가는 버튼이 스크롤 바를 만들지 않게 함 */
        }

        .v-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .emoji-container {
            font-size: 5rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        .question {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--main-pink);
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .compliment {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn { 
            background: var(--main-pink); 
            color: white; 
            z-index: 10; 
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
        }
        
        #noBtn { 
            background: #adb5bd; 
            color: white; 
            z-index: 100; /* 도망다닐 때 다른 요소 위로 올라오게 설정 */
        }

        .hidden { display: none !important; }

        #celebration-page h1 { font-size: 2.2rem; color: var(--main-pink); margin-bottom: 10px;}
        #celebration-page p { font-size: 1.1rem; color: #444; line-height: 1.5; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <div id="question-page" class="v-container">
        <div id="mainEmoji" class="emoji-container">🧸💖</div>
        
        <div class="question">Mari, con esa sonrisa tan encantadora y un corazón tan hermoso...</div>
        <div class="compliment">¿Quieres ser mi San Valentín?</div>
        
        <div class="options">
            <button id="yesBtn">¡SÍ!</button>
            <button id="noBtn">No...</button>
        </div>
    </div>

    <div id="celebration-page" class="v-container hidden">
        <div class="emoji-container">🥰🎉</div>
        <h1>¡Lo sabía! 🥰</h1>
        <p>
            ¡Salgamos a comer algo delicioso para recargar energías! 🍫🌹<br><br>
            <strong>¡Mucho ánimo con tus estudios de medicina, futura doctora! Siempre te apoyo. 🩺✨</strong>
        </p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const qPage = document.getElementById('question-page');
        const sPage = document.getElementById('celebration-page');
        const mainEmoji = document.getElementById('mainEmoji');

        let yesFontSize = 1; 
        let yesPadY = 12; 
        let yesPadX = 25; 
        let noClickCount = 0;
        let dodgeMode = false; // 도망 모드 활성화 여부

        const messages = [
            "¿De verdad, futura doctora? 🥺", 
            "Sé que estudiar medicina es duro, pero...", 
            "¡Te prometo mucha energía para estudiar! ☕", 
            "¡Tu hermosa sonrisa merece un SÍ!", 
            "¿En serio vas a rechazarme? 🚑", 
            "¡Ya ríndete y di que SÍ! 💖"
        ];

        // NO 버튼을 랜덤한 위치로 도망치게 만드는 함수
        function moveNoButton() {
            noBtn.style.position = 'fixed'; // 화면 전체를 기준으로 이동
            
            // 버튼이 화면 밖으로 나가지 않도록 여유 공간(20px) 계산
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;

            const randomX = Math.max(10, Math.random() * maxX);
            const randomY = Math.max(10, Math.random() * maxY);

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // NO 버튼 클릭 시
        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            // 1. YES 버튼 계속 키우기
            yesFontSize += 0.5;
            yesPadY += 8;
            yesPadX += 15;
            yesBtn.style.fontSize = `${yesFontSize}rem`;
            yesBtn.style.padding = `${yesPadY}px ${yesPadX}px`;
            
            // 2. 메시지 변경
            if(noClickCount <= messages.length) {
                noBtn.innerText = messages[noClickCount-1];
            } else {
                noBtn.innerText = "¡Atrápame si puedes! 😜"; // 날 잡아봐라!
            }

            // 3. 이모지 변경
            if(noClickCount === 2) mainEmoji.innerText = "🥺🩺";
            if(noClickCount === 4) mainEmoji.innerText = "🚑💦";
            if(noClickCount === 6) mainEmoji.innerText = "😭💖";

            // 4. 클릭할 때마다 도망가기
            moveNoButton();

            // 5. 2번 이상 누르면 악랄한 '도망 모드' 발동
            if(noClickCount >= 2) {
                dodgeMode = true;
            }
        });

        // [PC] 마우스가 버튼 근처에 오면 도망가기
        noBtn.addEventListener('mouseenter', () => {
            if (dodgeMode) moveNoButton();
        });

        // [모바일] 손가락으로 터치하려고 하면 클릭되기도 전에 도망가기
        noBtn.addEventListener('touchstart', (e) => {
            if (dodgeMode) {
                moveNoButton();
                e.preventDefault(); // 실제 클릭(터치)이 인식되지 않도록 막음
            }
        });

        // YES 버튼 클릭 시 성공 화면
        yesBtn.addEventListener('click', () => {
            qPage.classList.add('hidden');
            sPage.classList.remove('hidden');
        });
    </script>
</body>
</html>
