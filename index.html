<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Para la futura doctora Mari 🩺💌">
    <meta property="og:description" content="¡Tengo una pregunta muy importante para ti!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=500&auto=format&fit=crop">
    
    <title>Para Mari 💖</title>
    <style>
        :root {
            --bg-color: #ffeef2;
            --main-pink: #ff6b81;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .v-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            width: 85%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .gif-container {
            width: 100%;
            height: 180px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-container img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 15px;
        }

        .question {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--main-pink);
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .compliment {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 150px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn { background: var(--main-pink); color: white; z-index: 10; }
        #noBtn { background: #adb5bd; color: white; }

        .hidden { display: none !important; }

        #celebration-page h1 { font-size: 2.2rem; color: var(--main-pink); margin-bottom: 10px;}
        #celebration-page p { font-size: 1.1rem; color: #444; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="question-page" class="v-container">
        <div class="gif-container">
            <img id="mainGif" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3R4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="cute bear">
        </div>
        <div class="question">Mari, con esa sonrisa tan encantadora y un corazón tan hermoso... 💖</div>
        <div class="compliment">¿Quieres ser mi San Valentín?</div>
        <div class="options">
            <button id="yesBtn">¡SÍ!</button>
            <button id="noBtn">No...</button>
        </div>
    </div>

    <div id="celebration-page" class="v-container hidden">
        <div class="gif-container">
            <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3R4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/26BRv0ThflsHCqfJA/giphy.gif" alt="success bear">
        </div>
        <h1>¡Lo sabía! 🥰</h1>
        <p>
            ¡Salgamos a comer algo delicioso para recargar energías! 🍫🌹<br><br>
            <strong>¡Mucho ánimo con tus estudios de medicina, futura doctora! Siempre te apoyo. 🩺✨</strong>
        </p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const qPage = document.getElementById('question-page');
        const sPage = document.getElementById('celebration-page');
        const mainGif = document.getElementById('mainGif');

        let yesScale = 1;
        let noClickCount = 0;

        // 의대생 Mari를 위한 맞춤형 거절 반응 메시지
        const messages = [
            "¿De verdad, futura doctora? 🥺", 
            "Sé que estudiar medicina es duro, pero...", 
            "¡Te prometo mucha energía para estudiar! ☕", 
            "¡Tu hermosa sonrisa merece un SÍ!", 
            "¿En serio vas a rechazarme? 🚑", 
            "¡Ya ríndete y di que SÍ! 💖"
        ];

        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            // YES 버튼 키우기
            yesScale += 0.6;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            // 메시지 바꾸기
            if(noClickCount <= messages.length) {
                noBtn.innerText = messages[noClickCount-1];
            } else {
                noBtn.innerText = "¡Es tu única opción! 😂"; // 유일한 선택지야!
            }

            // 당황하는 이미지로 변경
            if(noClickCount === 3) {
                mainGif.src = "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHpueGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZzR4eGZ4bm9oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif"; 
            }
        });

        yesBtn.addEventListener('click', () => {
            qPage.classList.add('hidden');
            sPage.classList.remove('hidden');
        });
    </script>
</body>
</html>
